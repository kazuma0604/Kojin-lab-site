<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b14"/>
      <stop offset="1" stop-color="#05060b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="380" fill="url(#glow)"/>
  <circle cx="1000" cy="600" r="320" fill="url(#glow2)"/>

  <!-- brand row -->
  <rect x="80" y="72" width="96" height="96" rx="24" fill="url(#brand)"/>
  <text x="128" y="142" text-anchor="middle" font-family="Hiragino Sans, sans-serif" font-size="62" font-weight="800" fill="#06070c">L</text>
  <text x="196" y="139" font-family="Hiragino Sans, sans-serif" font-size="40" font-weight="700" fill="#f4f6fb">個人開発Lab</text>

  <!-- headline -->
  <text x="80" y="318" font-family="Hiragino Sans, sans-serif" font-size="80" font-weight="800" fill="#f4f6fb">LP・WordPressを、</text>
  <text x="80" y="412" font-family="Hiragino Sans, sans-serif" font-size="80" font-weight="800" fill="#f4f6fb">速く、きれいに。</text>

  <!-- tagline -->
  <text x="84" y="476" font-family="Hiragino Sans, sans-serif" font-size="30" font-weight="500" fill="#8b93a7">Claude Codeで、設計から実装・自動化まで対応します</text>

  <!-- divider + meta -->
  <rect x="80" y="540" width="1040" height="1.5" fill="#1c2438"/>
  <text x="80" y="586" font-family="Hiragino Sans, sans-serif" font-size="28" font-weight="700" fill="#38bdf8">LP 5万円〜 ／ WordPress 10万円〜</text>
  <text x="1120" y="586" text-anchor="end" font-family="Hiragino Sans, sans-serif" font-size="27" font-weight="600" fill="#8b93a7">@kojin_lab</text>
</svg>
